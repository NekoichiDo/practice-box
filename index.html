<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2W タスクカレンダー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント ---
    const IconCircle = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>;
    const IconArrowUp = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>;
    const IconArrowDown = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>;
    const IconChevronLeft = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconTrash2 = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const IconPlus = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const IconArrowDownToLine = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>;
    const IconArrowUpToLine = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 3h14"/><path d="m18 13-6-6-6 6"/><path d="M12 7v14"/></svg>;

    // --- ユーティリティ関数 ---
    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const offsetDateStr = (dateStr, offset) => {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dateObj = new Date(y, m - 1, d);
      dateObj.setDate(dateObj.getDate() + offset);
      return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
    };

    const formatDateUI = (dateStr) => {
      const d = new Date(dateStr);
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const md = `${d.getMonth()+1}/${d.getDate()}`;
      const dayStr = days[d.getDay()];
      
      const todayStr = getTodayStr();
      if (dateStr === todayStr) return `今日 (${md} ${dayStr})`;
      if (dateStr === offsetDateStr(todayStr, 1)) return `明日 (${md} ${dayStr})`;
      
      return `${md} (${dayStr})`;
    };

    const DEFAULT_COLORS = [
      { id: 'blue', hex: '#3b82f6', label: '青' },
      { id: 'red', hex: '#ef4444', label: '赤' },
      { id: 'green', hex: '#22c55e', label: '緑' },
      { id: 'orange', hex: '#f97316', label: '橙' },
      { id: 'purple', hex: '#a855f7', label: '紫' }
    ];

    // --- メインコンポーネント ---
    function App() {
      const todayStr = getTodayStr();
      
      const twoWeeksDates = Array.from({ length: 14 }).map((_, i) => offsetDateStr(todayStr, i));
      
      const [selectedDate, setSelectedDate] = useState(todayStr);

      const [taskColors, setTaskColors] = useState(() => {
        const saved = localStorage.getItem('task_processor_colors');
        return saved ? JSON.parse(saved) : DEFAULT_COLORS;
      });
      const [isEditingColors, setIsEditingColors] = useState(false);

      const [tasks, setTasks] = useState(() => {
        const saved = localStorage.getItem('task_processor_data');
        if (saved) {
          try {
            const loadedTasks = JSON.parse(saved);
            return loadedTasks.map(t => {
              if (t.status === 'immediate') return { id: t.id, text: t.text, date: todayStr, color: 'blue', time: '' };
              if (t.status === 'later') return { id: t.id, text: t.text, date: null, color: 'blue', time: '' };
              if (t.date && t.date < todayStr) return { ...t, date: todayStr, color: t.color || 'blue', time: t.time || '' };
              return { ...t, color: t.color || 'blue', time: t.time || '' };
            });
          } catch (e) {
            return [];
          }
        }
        return [
          { id: '1', text: 'サンプル：今日の夕方までにメール返信', date: todayStr, color: 'red', time: '17:00' },
          { id: '2', text: 'サンプル：明日のミーティングの資料確認', date: offsetDateStr(todayStr, 1), color: 'blue', time: '' },
          { id: '3', text: 'サンプル：週末に備品の買い出し', date: null, color: 'green', time: '' }
        ];
      });

      const [newTaskText, setNewTaskText] = useState('');
      const [newTaskTime, setNewTaskTime] = useState('');
      const [newTaskColor, setNewTaskColor] = useState('blue');

      useEffect(() => {
        localStorage.setItem('task_processor_data', JSON.stringify(tasks));
      }, [tasks]);

      useEffect(() => {
        localStorage.setItem('task_processor_colors', JSON.stringify(taskColors));
      }, [taskColors]);

      const updateColorLabel = (id, newLabel) => {
        setTaskColors(taskColors.map(c => c.id === id ? { ...c, label: newLabel } : c));
      };

      const addTask = (e) => {
        e.preventDefault();
        if (!newTaskText.trim()) return;
        
        const newTask = {
          id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
          text: newTaskText.trim(),
          date: selectedDate,
          time: newTaskTime,
          color: newTaskColor
        };
        
        setTasks([newTask, ...tasks]);
        setNewTaskText('');
        setNewTaskTime('');
      };

      const completeTask = (id) => {
        setTasks(tasks.filter(t => t.id !== id));
      };

      const shiftDate = (taskId, daysOffset) => {
        setTasks(tasks.map(t => {
          if (t.id === taskId && t.date) {
            return { ...t, date: offsetDateStr(t.date, daysOffset) };
          }
          return t;
        }));
      };

      const moveToLater = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, date: null } : t));
      };

      const moveToToday = (id) => {
        setTasks(tasks.map(t => t.id === id ? { ...t, date: todayStr } : t));
      };

      const moveOrderInGroup = (taskId, direction, groupTasks) => {
        const currentIndex = groupTasks.findIndex(t => t.id === taskId);
        if (currentIndex < 0) return;
        if (direction === -1 && currentIndex === 0) return;
        if (direction === 1 && currentIndex === groupTasks.length - 1) return;

        const targetTaskId = groupTasks[currentIndex + direction].id;

        const absoluteCurrentIndex = tasks.findIndex(t => t.id === taskId);
        const absoluteTargetIndex = tasks.findIndex(t => t.id === targetTaskId);

        const newTasks = [...tasks];
        const temp = newTasks[absoluteCurrentIndex];
        newTasks[absoluteCurrentIndex] = newTasks[absoluteTargetIndex];
        newTasks[absoluteTargetIndex] = temp;

        setTasks(newTasks);
      };

      const laterTasks = tasks.filter(t => t.date === null || t.date > twoWeeksDates[13]);
      const selectedDateTasks = tasks.filter(t => t.date === selectedDate);

      return (
        <div className="min-h-screen bg-gray-100 text-gray-800 font-sans pb-20">
          <div className="max-w-md mx-auto p-4 sm:p-6">
            <header className="mb-6">
              <h1 className="text-xl font-bold text-gray-900 tracking-tight">2W タスクカレンダー</h1>
            </header>

            <div className="space-y-6">
              <section className="bg-white p-2 sm:p-4 rounded-xl shadow-sm border border-gray-200">
                <div className="grid grid-cols-7 gap-1 sm:gap-2">
                  {twoWeeksDates.map((dateStr, index) => {
                    const dayTasks = tasks.filter(t => t.date === dateStr);
                    const d = new Date(dateStr);
                    const isToday = index === 0;
                    const isSaturday = d.getDay() === 6;
                    const isSunday = d.getDay() === 0;
                    const isSelected = dateStr === selectedDate;
                    
                    const headerColor = isSunday ? 'text-red-500' : isSaturday ? 'text-blue-500' : 'text-gray-700';
                    
                    return (
                      <div 
                        key={dateStr}
                        onClick={() => setSelectedDate(dateStr)}
                        className={`flex flex-col border rounded cursor-pointer transition-colors min-h-[70px] sm:min-h-[80px]
                          ${isSelected ? 'ring-2 ring-blue-500 bg-blue-50 border-blue-200' : 'border-gray-100 hover:bg-gray-50'}
                        `}
                      >
                        <div className={`text-center py-1 text-[10px] sm:text-xs font-medium border-b border-gray-100 ${headerColor} ${isToday ? 'bg-blue-100' : 'bg-gray-50'}`}>
                          {d.getMonth()+1}/{d.getDate()}({['日','月','火','水','木','金','土'][d.getDay()]})
                        </div>
                        <div className="flex-1 p-0.5 sm:p-1 overflow-hidden">
                          {dayTasks.map(t => {
                            const c = taskColors.find(col => col.id === t.color)?.hex || '#3b82f6';
                            return (
                              <div key={t.id} className="text-[9px] sm:text-[10px] leading-tight mb-0.5 truncate flex items-center gap-0.5" title={t.text}>
                                <span style={{color: c}}>⚫️</span>
                                <span className="text-gray-600 truncate">{t.time ? t.time : t.text}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </section>

              <section className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden border-t-4 border-t-blue-500">
                <div className="bg-blue-50 px-4 py-3 border-b border-blue-100 flex justify-between items-center">
                  <h2 className="font-bold text-blue-900 flex items-center gap-2">
                    {formatDateUI(selectedDate)} の予定
                  </h2>
                </div>

                <div className="p-4">
                  <form onSubmit={addTask} className="mb-6 space-y-3">
                    <div className="flex gap-2">
                      <input
                        type="time"
                        value={newTaskTime}
                        onChange={(e) => setNewTaskTime(e.target.value)}
                        className="p-2 border border-gray-300 rounded-lg text-sm w-24 outline-none focus:ring-2 focus:ring-blue-500"
                      />
                      <input
                        type="text"
                        value={newTaskText}
                        onChange={(e) => setNewTaskText(e.target.value)}
                        placeholder="予定を入力"
                        className="flex-1 p-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"
                      />
                    </div>
                    <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                      <div className="flex flex-wrap items-center gap-2 flex-1">
                        {taskColors.map(c => (
                          <button
                            key={c.id}
                            type="button"
                            onClick={() => setNewTaskColor(c.id)}
                            className={`px-2 py-1 rounded-full border-2 flex items-center gap-1 text-[10px] sm:text-xs transition-colors ${newTaskColor === c.id ? 'border-gray-600 bg-white' : 'border-transparent bg-transparent hover:bg-gray-200'}`}
                          >
                            <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: c.hex }}></span>
                            <span className="text-gray-700 font-medium">{c.label}</span>
                          </button>
                        ))}
                        <button 
                          type="button" 
                          onClick={() => setIsEditingColors(!isEditingColors)}
                          className="text-[10px] sm:text-xs text-blue-600 hover:text-blue-800 underline px-1"
                        >
                          {isEditingColors ? '完了' : '名前変更'}
                        </button>
                      </div>
                      <button
                        type="submit"
                        className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 flex items-center justify-center gap-1 shrink-0"
                      >
                        <IconPlus size={16} /> 追加
                      </button>
                    </div>

                    {isEditingColors && (
                      <div className="bg-white p-3 rounded-lg border border-gray-200 grid grid-cols-2 gap-2 mt-2 shadow-inner">
                        {taskColors.map(c => (
                          <div key={c.id} className="flex items-center gap-2">
                            <span className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: c.hex }}></span>
                            <input
                              type="text"
                              value={c.label}
                              onChange={(e) => updateColorLabel(c.id, e.target.value)}
                              className="w-full text-xs p-1.5 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none"
                              placeholder="ラベル名"
                            />
                          </div>
                        ))}
                      </div>
                    )}
                  </form>

                  <div className="space-y-2">
                    {selectedDateTasks.length === 0 ? (
                      <p className="text-gray-400 text-sm italic text-center py-4">予定はありません</p>
                    ) : (
                      selectedDateTasks.map((task) => {
                        const cColor = taskColors.find(col => col.id === task.color)?.hex || '#3b82f6';
                        return (
                          <div key={task.id} className="bg-white rounded-lg border border-gray-200 p-3 flex flex-col gap-2 shadow-sm">
                            <div className="flex items-start gap-2">
                              <button onClick={() => completeTask(task.id)} className="mt-0.5 text-gray-300 hover:text-green-500 transition-colors shrink-0">
                                <IconCircle size={20} />
                              </button>
                              <span className="flex-1 text-sm font-medium text-gray-800 break-words leading-tight flex items-center gap-1">
                                <span style={{color: cColor}}>⚫️</span>
                                {task.time && <span className="text-gray-500 text-xs mr-1">{task.time}</span>}
                                {task.text}
                              </span>
                            </div>
                            
                            <div className="flex justify-between items-center pt-2 border-t border-gray-50 mt-1">
                              <div className="flex gap-1">
                                <button 
                                  onClick={() => moveOrderInGroup(task.id, -1, selectedDateTasks)}
                                  disabled={selectedDateTasks.indexOf(task) === 0}
                                  className="p-1 text-gray-400 hover:text-gray-800 rounded disabled:opacity-30"
                                >
                                  <IconArrowUp size={16} />
                                </button>
                                <button 
                                  onClick={() => moveOrderInGroup(task.id, 1, selectedDateTasks)}
                                  disabled={selectedDateTasks.indexOf(task) === selectedDateTasks.length - 1}
                                  className="p-1 text-gray-400 hover:text-gray-800 rounded disabled:opacity-30"
                                >
                                  <IconArrowDown size={16} />
                                </button>
                              </div>
                              <div className="flex gap-1 items-center">
                                <button 
                                  onClick={() => shiftDate(task.id, -1)}
                                  disabled={task.date === twoWeeksDates[0]}
                                  className="p-1 text-blue-500 hover:bg-blue-100 rounded disabled:opacity-30"
                                  title="前日へ"
                                >
                                  <IconChevronLeft size={18} />
                                </button>
                                <button 
                                  onClick={() => shiftDate(task.id, 1)}
                                  className="p-1 text-blue-500 hover:bg-blue-100 rounded"
                                  title="翌日へ"
                                >
                                  <IconChevronRight size={18} />
                                </button>
                                <div className="w-px h-4 bg-gray-200 mx-1"></div>
                                <button 
                                  onClick={() => moveToLater(task.id)}
                                  className="p-1 text-gray-400 hover:bg-gray-100 rounded flex items-center gap-1"
                                  title="少し先へ"
                                >
                                  <IconArrowDownToLine size={16} />
                                </button>
                                <button 
                                  onClick={() => completeTask(task.id)}
                                  className="p-1 text-gray-300 hover:text-red-500 rounded ml-1"
                                >
                                  <IconTrash2 size={16} />
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </section>

              <section>
                <h2 className="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2 border-t border-gray-200 pt-6">
                  少し先・未定のタスク ({laterTasks.length})
                </h2>
                
                <div className="space-y-2">
                  {laterTasks.length === 0 ? (
                    <p className="text-gray-400 text-sm italic">該当するタスクはありません</p>
                  ) : (
                    laterTasks.map((task) => {
                      const cColor = taskColors.find(col => col.id === task.color)?.hex || '#3b82f6';
                      return (
                        <div 
                          key={task.id} 
                          className="bg-gray-50 p-3 rounded-lg border border-gray-200 flex flex-col gap-2 opacity-80"
                        >
                          <div className="flex items-start gap-2">
                            <button onClick={() => completeTask(task.id)} className="mt-0.5 text-gray-300 hover:text-green-500 transition-colors shrink-0">
                              <IconCircle size={20} />
                            </button>
                            <span className="flex-1 text-sm text-gray-600 break-words flex items-center gap-1">
                              <span style={{color: cColor}}>⚫️</span>
                              {task.text}
                            </span>
                          </div>

                          <div className="flex justify-between items-center pl-7 pt-1">
                            <div className="flex gap-1">
                              <button 
                                onClick={() => moveOrderInGroup(task.id, -1, laterTasks)}
                                disabled={laterTasks.indexOf(task) === 0}
                                className="p-1 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded disabled:opacity-30"
                              >
                                <IconArrowUp size={16} />
                              </button>
                              <button 
                                onClick={() => moveOrderInGroup(task.id, 1, laterTasks)}
                                disabled={laterTasks.indexOf(task) === laterTasks.length - 1}
                                className="p-1 text-gray-400 hover:text-gray-700 hover:bg-gray-200 rounded disabled:opacity-30"
                              >
                                <IconArrowDown size={16} />
                              </button>
                            </div>
                            <div className="flex gap-2">
                              <button 
                                onClick={() => moveToToday(task.id)}
                                className="text-xs flex items-center gap-1 text-blue-600 hover:text-blue-800 px-2 py-1 rounded hover:bg-blue-50 font-medium"
                              >
                                <IconArrowUpToLine size={14} /> 今日へ
                              </button>
                              <button 
                                onClick={() => completeTask(task.id)}
                                className="p-1 text-gray-300 hover:text-red-500 rounded hover:bg-red-50"
                              >
                                <IconTrash2 size={14} />
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
